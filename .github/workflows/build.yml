name: Debian 13 GNOME Stick ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 核心优化 1：使用目前 GitHub 上最彻底的清空动作，腾出约 35GB 空间
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap devscripts

      - name: Configure and Build
        run: |
          mkdir -p build && cd build
          
          # 初始化配置
          lb config \
            --distribution trixie \
            --debian-installer live \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-indices false \
            --memtest none \
            --initramfs live-boot \
            --system systemd \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/"

          # 【核心修复 A】：直接修改生成的配置文件，防止 lb 自动拼接出 linux-amd64
          # 这是参照 GitHub 稳定模板的做法，暴力覆盖比变量注入更稳
          sed -i 's/LB_LINUX_FLAVOURS=.*/LB_LINUX_FLAVOURS="amd64"/' config/binary
          sed -i 's/LB_LINUX_PACKAGES=.*/LB_LINUX_PACKAGES="linux-image"/' config/binary

          # 【核心修复 B】：关掉所有可能泄露 Ubuntu 镜像的自动源生成
          sed -i 's/LB_SECURITY=.*/LB_SECURITY="false"/' config/binary
          sed -i 's/LB_UPDATES=.*/LB_UPDATES="false"/' config/binary

          # 手动注入 Debian 官方安全源，彻底解决 404 security.ubuntu.com 报错
          mkdir -p config/archives
          echo "deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware" > config/archives/debian-security.list.chroot

          # 软件包清单：只保留你需要的 GNOME、驱动和纯净 Python
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/my.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          network-manager-gnome
          python3
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          bluez
          bluetooth
          fonts-wqy-microhei
          locales
          EOF

          # 预设中文环境
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

          # 执行构建
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: debian13-gnome-iso
          path: build/*.iso
