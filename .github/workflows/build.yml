name: Build Debian 13 GNOME ISO (Final Source Fix)
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Build Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 1024
          swap-size-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          overprovision-lvm: 'true'

      - name: Brutal Disk Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/man /usr/share/doc /usr/share/locale
          sudo apt-get clean

      - name: Install Live Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap devscripts

      - name: Configure and Build
        run: |
          mkdir -p live-build-dir && cd live-build-dir
          
          # 1. 基础初始化
          lb config \
            --distribution trixie \
            --debian-installer live \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-indices false \
            --memtest none \
            --initramfs live-boot \
            --system systemd \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/"

          # 2. 核心修复 A：强制改写内核包名配置
          echo 'LB_LINUX_PACKAGES="linux-image"' > config/binary
          echo 'LB_LINUX_FLAVOURS="amd64"' >> config/binary

          # 3. 核心修复 B：手动定义安全更新源，防止泄露到 Ubuntu 镜像
          mkdir -p config/archives
          echo "deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware" > config/archives/debian-security.list.chroot
          echo "deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware" > config/archives/debian-updates.list.chroot

          # 4. 软件包清单 (完全纯净版：GNOME + Python + 驱动)
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/desktop.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          locales
          fonts-wqy-microhei
          network-manager-gnome
          python3
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          bluez
          bluetooth
          EOF

          # 5. 预设中文
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

          # 6. 执行构建
          sudo lb build

      - name: Locate and Rename ISO
        run: |
          find . -name "*.hybrid.iso" -exec mv {} ./debian13-gnome-stick.iso \;
          find . -name "*.iso" ! -name "debian13-gnome-stick.iso" -exec mv {} ./debian13-gnome-stick.iso \;

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-gnome-iso
          path: debian13-gnome-stick.iso
