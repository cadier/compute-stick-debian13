name: Build Debian 13 For Compute Stick
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          overprovision-lvm: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update || true
          # 安装 mmdebstrap 和关键的 Debian 密钥库包
          sudo apt-get install -y --no-install-recommends \
            mmdebstrap \
            qemu-user-static \
            binfmt-support \
            debian-archive-keyring

      - name: Manual Deep Cleanup
        run: |
          # 进一步手动清理没用的预装大文件
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Build Trixie Image
        run: |
          # 1. 编写环境配置脚本
          cat <<EOF > setup.sh
          #!/bin/bash
          echo "zh_CN.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          update-locale LANG=zh_CN.UTF-8
          echo "debian-stick" > /etc/hostname
          EOF
          chmod +x setup.sh

          # 2. 执行云编译 (Debian 13 Trixie)
          # 包含：中文支持、XFCE桌面、Python环境、Supervisor守护进程、必要的硬件固件
          sudo mmdebstrap \
            --architectures=amd64 \
            --components="main,contrib,non-free,non-free-firmware" \
            --keyring=/usr/share/keyrings/debian-archive-keyring.gpg \
            --include="locales,fonts-wqy-microhei,xfce4,xfce4-terminal,lightdm,network-manager-gnome,python3,python3-pip,python3-venv,supervisor,firmware-linux,firmware-realtek,firmware-intel-sound,intel-media-va-driver-non-free,firefox-esr,sudo,nano,htop,zram-tools" \
            --setup-hook=./setup.sh \
            trixie \
            debian13-stick-rootfs.tar.xz \
            "http://deb.debian.org/debian/"
          
          # 3. 修正权限，否则下一阶段无法读取文件
          sudo chmod 644 debian13-stick-rootfs.tar.xz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-image
          path: debian13-stick-rootfs.tar.xz
          if-no-files-found: error
