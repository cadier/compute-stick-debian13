name: Build Debian 13 ISO For Compute Stick
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          overprovision-lvm: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ISO Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y simple-cdd mtools xorriso debian-archive-keyring gpg

      - name: Prepare Local Keyring
        run: |
          # 创建本地密钥目录
          mkdir -p my-iso/keyrings
          # 拷贝系统自带的 Debian 密钥
          cp /usr/share/keyrings/debian-archive-keyring.gpg my-iso/keyrings/debian-archive-keyring.gpg
          # 初始化本地 GPG 环境
          gpg --list-keys

      - name: Manual Deep Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Configure and Build ISO
        run: |
          mkdir -p my-iso/profiles
          
          # 1. 定义软件包清单 (确保安装 GNOME 桌面环境)
          cat <<EOF > my-iso/profiles/custom.downloads
          locales
          fonts-wqy-microhei
          task-gnome-desktop
          network-manager-gnome
          python3
          python3-pip
          python3-venv
          supervisor
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          zram-tools
          EOF

          # 2. 预设自动配置
          echo "d-i debian-installer/locale string zh_CN" > my-iso/profiles/custom.preseed
          echo "d-i keyboard-configuration/xkb-keymap select us" >> my-iso/profiles/custom.preseed

          # 3. 运行构建
          # 明确指定使用本地拷贝的密钥环
          build-simple-cdd \
            --dist trixie \
            --profiles custom \
            --force-preseed \
            --keyring "$(pwd)/my-iso/keyrings/debian-archive-keyring.gpg"

          # 4. 定位生成的 ISO 文件并重命名
          echo "Searching for generated ISO file..."
          ISO_PATH=$(find . -name "*.iso" | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "Error: ISO file not found!"
            exit 1
          fi
          mv "$ISO_PATH" ./debian13-stick-installer.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-install-iso
          path: debian13-stick-installer.iso
          if-no-files-found: error
