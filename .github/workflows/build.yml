name: Build Debian 13 ISO For Compute Stick
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          overprovision-lvm: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ISO Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y simple-cdd mtools xorriso debian-archive-keyring wget

      - name: Manual Deep Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Configure and Build ISO
        run: |
          mkdir -p my-iso/profiles
          
          # 1. 定义要安装的软件包（包含图形界面、Python、驱动等）
          # 注意：这里加入了 firmware-linux 以确保计算棒硬件兼容性
          cat <<EOF > my-iso/profiles/custom.downloads
          locales
          fonts-wqy-microhei
          xfce4
          xfce4-terminal
          lightdm
          network-manager-gnome
          python3
          python3-pip
          python3-venv
          supervisor
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          zram-tools
          EOF

          # 2. 预设自动配置 (Preseed) - 确保安装过程更丝滑
          echo "d-i debian-installer/locale string zh_CN" > my-iso/profiles/custom.preseed
          echo "d-i keyboard-configuration/xkb-keymap select us" >> my-iso/profiles/custom.preseed

          # 3. 开始构建 ISO
          # --dist trixie 指向 Debian 13
          # --force-preseed 强制使用预设配置
          sudo build-simple-cdd \
            --dist trixie \
            --profiles custom \
            --force-preseed \
            --graphical-installer \
            --output-dir images

          # 4. 重命名 ISO 方便辨认
          mv images/*.iso debian13-stick-installer.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-install-iso
          path: debian13-stick-installer.iso
          if-no-files-found: error
