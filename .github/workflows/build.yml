name: Debian 13 Trixie GNOME Installer ISO (Auto Package Bug Fixed)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximum Disk Cleanup
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /var/lib/docker
          sudo docker system prune -af || true
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            debian-archive-keyring \
            arch-test \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Configure Debian 13 ISO
        run: |
          mkdir -p build
          cd build

          sudo lb clean --purge || true

          export LB_BUILD_WITH_CHROOT_CACHE=false
          export LB_BUILD_WITH_BINARY_CACHE=false

          lb config \
            --mode debian \
            --distribution trixie \
            --architectures amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --debian-installer live \
            --debian-installer-gui true \
            --apt apt \
            --apt-recommends false \
            --apt-secure true \
            --apt-indices false \
            --memtest none \
            --win32-loader false \
            --bootappend-live "boot=live components locales=zh_CN.UTF-8 username=live hostname=debian quiet splash" \
            --initramfs live-boot \
            --system systemd

          # Bootstrap 配置
          cat > config/bootstrap <<EOF
          LB_MODE="debian"
          LB_DISTRIBUTION="trixie"
          LB_ARCHITECTURES="amd64"
          LB_SECURITY="false"
          LB_UPDATES="false"
          export DEBOOTSTRAP_KEYRING=/usr/share/keyrings/debian-archive-keyring.gpg
          EOF

          # Common 配置
          cat > config/common <<EOF
          LB_MODE="debian"
          LB_DISTRIBUTION="trixie"
          LB_ARCHITECTURES="amd64"
          LB_APT="apt"
          LB_APT_RECOMMENDS="false"
          LB_SECURITY="false"
          LB_UPDATES="false"
          LB_BACKPORTS="false"
          EOF

          # Binary 配置（关键修复：禁用 auto）
          cat > config/binary <<EOF
          LB_MODE="debian"
          LB_DISTRIBUTION="trixie"
          LB_ARCHITECTURES="amd64"
          LB_BINARY_IMAGES="iso-hybrid"
          LB_DEBIAN_INSTALLER="live"
          LB_DEBIAN_INSTALLER_GUI="true"
          LB_APT_SOURCES_LIST="false"
          LB_SECURITY="false"
          LB_UPDATES="false"
          LB_BACKPORTS="false"
          LB_APT_INDICES="false"
          LB_LINUX_FLAVOURS="amd64"
          LB_LINUX_PACKAGES="none"
          LB_BOOTLOADERS="grub-efi"
          LB_BOOTAPPEND_INSTALL=""
          EOF

          # 删除默认 package list（防止 live-build 自动加入 auto）
          rm -rf config/package-lists
          mkdir -p config/package-lists

          # 删除默认源
          rm -rf config/archives
          mkdir -p config/archives

          # Debian 官方源
          cat <<EOF > config/archives/debian.list.chroot
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          EOF

          cat <<EOF > config/archives/debian.list.binary
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          EOF

          # 软件包
          cat <<EOF > config/package-lists/desktop.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          network-manager-gnome
          gdm3
          debian-installer-launcher
          firefox-esr
          python3
          sudo
          nano
          htop
          gparted
          parted
          os-prober
          bluez
          bluetooth
          firmware-linux
          firmware-realtek
          firmware-iwlwifi
          firmware-intel-sound
          intel-media-va-driver-non-free
          xserver-xorg-video-intel
          alsa-utils
          pipewire
          pipewire-alsa
          pipewire-pulse
          wireplumber
          pavucontrol
          fonts-wqy-microhei
          locales
          fcitx5
          fcitx5-chinese-addons
          EOF

          # 中文环境
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

          mkdir -p config/includes.chroot/etc
          cat <<EOF > config/includes.chroot/etc/locale.gen
          zh_CN.UTF-8 UTF-8
          en_US.UTF-8 UTF-8
          EOF

          # sudo
          mkdir -p config/includes.chroot/etc/sudoers.d
          echo "live ALL=(ALL) NOPASSWD:ALL" > config/includes.chroot/etc/sudoers.d/live

          # 输入法
          mkdir -p config/includes.chroot/etc/skel
          cat <<EOF > config/includes.chroot/etc/skel/.xprofile
          export LANG=zh_CN.UTF-8
          export GTK_IM_MODULE=fcitx
          export QT_IM_MODULE=fcitx
          export XMODIFIERS=@im=fcitx
          EOF

          # 清理
          mkdir -p config/hooks/live
          cat <<'EOF' > config/hooks/live/cleanup.hook.chroot
          #!/bin/bash
          rm -rf /usr/share/doc/*
          rm -rf /usr/share/man/*
          rm -rf /usr/share/info/*
          apt-get clean
          EOF
          chmod +x config/hooks/live/cleanup.hook.chroot

          # 删除 GitHub runner 污染源
          sudo rm -f /etc/apt/sources.list.d/* || true
          sudo sed -i '/security.debian.org/d' /etc/apt/sources.list || true

          sudo lb build

      - name: Show Build Output
        run: |
          ls -lh build/
          df -h

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: debian13-trixie-gnome-installer-iso
          path: build/*.iso
