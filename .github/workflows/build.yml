name: Build Debian 13 ISO For Compute Stick
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          overprovision-lvm: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ISO Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y simple-cdd mtools xorriso debian-archive-keyring wget

      - name: Manual Deep Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Configure and Build ISO
        run: |
          mkdir -p my-iso/profiles
          
          # 1. 定义要安装的软件包清单
          # 包含 XFCE 桌面、Python 交易环境、中文字体和计算棒必备固件
          cat <<EOF > my-iso/profiles/custom.downloads
          locales
          fonts-wqy-microhei
          xfce4
          xfce4-terminal
          lightdm
          network-manager-gnome
          python3
          python3-pip
          python3-venv
          supervisor
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          zram-tools
          EOF

          # 2. 预设自动配置 (Preseed)
          echo "d-i debian-installer/locale string zh_CN" > my-iso/profiles/custom.preseed
          echo "d-i keyboard-configuration/xkb-keymap select us" >> my-iso/profiles/custom.preseed

          # 3. 运行构建命令
          # 移除不兼容的 --graphical-installer 和 --output-dir 参数
          # 使用 --dist trixie 确保获取 2026 年当下的稳定版系统
          sudo build-simple-cdd \
            --dist trixie \
            --profiles custom \
            --force-preseed

          # 4. 自动定位生成的 ISO 并重命名
          # simple-cdd 可能会将 ISO 放在 tmp 或 images 目录下，这里做全局搜索
          echo "Searching for generated ISO file..."
          ISO_PATH=$(find . -name "*.iso" | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "Error: ISO file not found!"
            exit 1
          fi
          echo "Found ISO at $ISO_PATH, moving to project root..."
          sudo mv "$ISO_PATH" ./debian13-stick-installer.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-install-iso
          path: debian13-stick-installer.iso
          if-no-files-found: error
