```yaml id="a7k2mz"
name: Debian 13 Trixie GNOME Installer ISO (GitHub Full Fixed)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximum Disk Cleanup
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /var/lib/docker
          sudo docker system prune -af || true
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            debian-archive-keyring \
            arch-test \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Configure Debian 13 ISO
        run: |
          mkdir -p build
          cd build

          sudo lb clean --purge || true

          # 禁用缓存减少空间占用
          export LB_BUILD_WITH_CHROOT_CACHE=false
          export LB_BUILD_WITH_BINARY_CACHE=false

          lb config \
            --mode debian \
            --distribution trixie \
            --architectures amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --debian-installer live \
            --debian-installer-gui true \
            --apt-recommends false \
            --apt-indices false \
            --memtest none \
            --win32-loader false \
            --bootappend-live "boot=live components locales=zh_CN.UTF-8 username=live hostname=debian quiet splash" \
            --initramfs live-boot \
            --system systemd

          # 修复旧版 live-build 的 Debian keyring 问题
          echo 'export DEBOOTSTRAP_KEYRING=/usr/share/keyrings/debian-archive-keyring.gpg' >> config/bootstrap

          # 禁止自动软件源，完全手动接管
          sed -i 's/^LB_APT_SOURCES_LIST=.*/LB_APT_SOURCES_LIST="false"/' config/binary
          sed -i 's/^LB_SECURITY=.*/LB_SECURITY="false"/' config/binary
          sed -i 's/^LB_UPDATES=.*/LB_UPDATES="false"/' config/binary
          sed -i 's/^LB_BACKPORTS=.*/LB_BACKPORTS="false"/' config/binary

          # 内核
          sed -i 's/^LB_LINUX_FLAVOURS=.*/LB_LINUX_FLAVOURS="amd64"/' config/binary
          sed -i 's/^LB_LINUX_PACKAGES=.*/LB_LINUX_PACKAGES="linux-image"/' config/binary

          # 官方 Debian 软件源（避免 Ubuntu 污染）
          mkdir -p config/archives
          cat <<EOF > config/archives/debian.list.chroot
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          EOF

          # GNOME + 安装器 + 老设备驱动
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/desktop.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          network-manager-gnome
          gdm3
          debian-installer-launcher
          firefox-esr
          python3
          sudo
          nano
          htop
          gparted
          parted
          os-prober
          bluez
          bluetooth
          firmware-linux
          firmware-realtek
          firmware-iwlwifi
          firmware-intel-sound
          intel-media-va-driver-non-free
          xserver-xorg-video-intel
          alsa-utils
          pulseaudio
          pavucontrol
          fonts-wqy-microhei
          locales
          fcitx5
          fcitx5-chinese-addons
          EOF

          # 中文环境
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

          mkdir -p config/includes.chroot/etc
          cat <<EOF > config/includes.chroot/etc/locale.gen
          zh_CN.UTF-8 UTF-8
          en_US.UTF-8 UTF-8
          EOF

          # Live 用户 sudo
          mkdir -p config/includes.chroot/etc/sudoers.d
          echo "live ALL=(ALL) NOPASSWD:ALL" > config/includes.chroot/etc/sudoers.d/live

          # 输入法环境
          mkdir -p config/includes.chroot/etc/skel
          cat <<EOF > config/includes.chroot/etc/skel/.xprofile
          export LANG=zh_CN.UTF-8
          export GTK_IM_MODULE=fcitx
          export QT_IM_MODULE=fcitx
          export XMODIFIERS=@im=fcitx
          EOF

          # 清理文档减少体积
          mkdir -p config/hooks/live
          cat <<'EOF' > config/hooks/live/cleanup.hook.chroot
          #!/bin/bash
          rm -rf /usr/share/doc/*
          rm -rf /usr/share/man/*
          rm -rf /usr/share/info/*
          apt-get clean
          EOF
          chmod +x config/hooks/live/cleanup.hook.chroot

          # 开始构建
          sudo lb build

      - name: Show Build Output
        run: |
          ls -lh build/
          df -h

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: debian13-trixie-gnome-installer-iso
          path: build/*.iso
```
