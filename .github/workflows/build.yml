name: Build Debian 13 GNOME ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Live Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap devscripts

      - name: Configure Live Build
        run: |
          mkdir -p live-build-dir && cd live-build-dir
          
          # 1. 初始化配置 (指定 Trixie 稳定版，包含 non-free 固件库)
          # 注意：non-free-firmware 是 2026 年驱动兼容的核心
          lb config \
            --distribution trixie \
            --debian-installer live \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-indices false \
            --memtest none \
            --mirror-bootstrap "http://deb.debian.org/debian/"

          # 2. 注入软件包列表 (GNOME 桌面 + Python 交易环境 + 驱动)
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/my-packages.list.chroot
          task-gnome-desktop
          locales
          fonts-wqy-microhei
          network-manager-gnome
          python3
          python3-pip
          python3-venv
          supervisor
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          zram-tools
          bluez
          bluetooth
          EOF

          # 3. 预设语言为中文
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

      - name: Build ISO
        run: |
          cd live-build-dir
          # live-build 必须用 sudo 运行，它能完美处理 2026 年的密钥验证
          sudo lb build

      - name: Locate and Rename ISO
        run: |
          find . -name "*.hybrid.iso" -exec mv {} ./debian13-gnome-stick.iso \;
          # 如果没有 hybrid.iso，尝试找普通的 iso
          find . -name "*.iso" ! -name "debian13-gnome-stick.iso" -exec mv {} ./debian13-gnome-stick.iso \;

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-gnome-iso
          path: debian13-gnome-stick.iso
