name: Debian 13 Trixie GNOME ISO (Pure Injection)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap

      - name: Configure and Build
        run: |
          mkdir -p build && cd build
          
          # 1. 极简初始化：移除所有可能导致冲突的 mirror 参数
          lb config \
            --distribution trixie \
            --archive-areas "main contrib non-free non-free-firmware" \
            --initramfs live-boot \
            --system systemd

          # 2. 【核心修复 A】：完全接管软件源配置
          # 禁用 lb 自动生成的 sources.list，改用我们注入的 .list.chroot 文件
          sed -i 's/LB_APT_SOURCES_LIST=.*/LB_APT_SOURCES_LIST="false"/' config/binary
          sed -i 's/LB_SECURITY=.*/LB_SECURITY="false"/' config/binary
          sed -i 's/LB_UPDATES=.*/LB_UPDATES="false"/' config/binary
          
          # 3. 【核心修复 B】：锁定内核名
          sed -i 's/LB_LINUX_FLAVOURS=.*/LB_LINUX_FLAVOURS="amd64"/' config/binary
          sed -i 's/LB_LINUX_PACKAGES=.*/LB_LINUX_PACKAGES="linux-image"/' config/binary

          # 4. 物理注入唯一的官方 Debian 源 (根本上解决配置重复和 Ubuntu 污染)
          mkdir -p config/archives
          cat <<EOF > config/archives/debian.list.chroot
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          EOF

          # 5. 软件包清单 (满足你的需求：GNOME + 驱动 + 基础 Python)
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/my.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          network-manager-gnome
          python3
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          bluez
          bluetooth
          fonts-wqy-microhei
          locales
          EOF

          # 6. 预设中文环境
          mkdir -p config/includes.chroot/etc/default
          echo "LANG=zh_CN.UTF-8" > config/includes.chroot/etc/default/locale

          # 执行构建
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: debian13-pure-gnome-iso
          path: build/*.iso
