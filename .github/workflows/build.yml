name: Debian 13 Trixie GNOME ISO (Nuclear Fix)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 彻底解决空间不足 (根本原因之二：空间不够会导致 apt 写入失败)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap

      - name: Configure and Build
        run: |
          mkdir -p build && cd build
          
          # 第一步：基础初始化
          lb config \
            --distribution trixie \
            --debian-installer live \
            --archive-areas "main contrib non-free non-free-firmware" \
            --initramfs live-boot \
            --system systemd \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/"

          # 第二步：【根本性修复】直接改写生成的配置文件，消除一切自动生成的污染
          # 1. 强制锁定内核包名，防止拼接出 linux-amd64
          sed -i 's/LB_LINUX_FLAVOURS=.*/LB_LINUX_FLAVOURS="amd64"/' config/binary
          sed -i 's/LB_LINUX_PACKAGES=.*/LB_LINUX_PACKAGES="linux-image"/' config/binary
          
          # 2. 彻底关闭所有自动探测的安全源和更新源 (这是 404 报错的根源)
          sed -i 's/LB_SECURITY=.*/LB_SECURITY="false"/' config/binary
          sed -i 's/LB_UPDATES=.*/LB_UPDATES="false"/' config/binary
          sed -i 's/LB_APT_INDICES=.*/LB_APT_INDICES="false"/' config/binary

          # 第三步：手动建立正确的 Debian 官方源清单
          mkdir -p config/archives
          echo "deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware" > config/archives/debian.list.chroot
          echo "deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware" >> config/archives/debian.list.chroot

          # 第四步：注入你要求的软件包清单 (纯净版：GNOME + 驱动 + 基础 Python)
          mkdir -p config/package-lists
          cat <<EOF > config/package-lists/my.list.chroot
          linux-image-amd64
          live-boot
          live-config
          live-config-systemd
          task-gnome-desktop
          network-manager-gnome
          python3
          firmware-linux
          firmware-realtek
          firmware-intel-sound
          intel-media-va-driver-non-free
          firefox-esr
          sudo
          nano
          htop
          bluez
          bluetooth
          fonts-wqy-microhei
          locales
          EOF

          # 第五步：执行构建
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: debian13-pure-gnome-iso
          path: build/*.iso
