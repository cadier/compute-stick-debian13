name: Debian 13 Official ISO Semi-Auto Customizer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /var/lib/docker
          sudo docker system prune -af || true
          df -h

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget curl rsync xorriso isolinux syslinux-utils \
            squashfs-tools p7zip-full

      - name: Download Official Debian 13 Netinst ISO
        run: |
          mkdir -p work && cd work
          BASE_URL="https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/"
          ISO_NAME=$(curl -sL $BASE_URL | grep -oP 'debian-13\.[0-9.]+\-amd64-netinst\.iso' | head -n 1)
          
          if [ -z "$ISO_NAME" ]; then
            echo "Stable not found, fallback to daily..."
            BASE_URL="https://cdimage.debian.org/cdimage/daily-builds/daily/arch-latest/amd64/iso-cd/"
            ISO_NAME=$(curl -sL $BASE_URL | grep -oP 'debian-testing-amd64-netinst.iso' | head -n 1)
          fi
          
          echo "Downloading: ${BASE_URL}${ISO_NAME}"
          wget -q -O debian.iso "${BASE_URL}${ISO_NAME}"

      - name: Extract ISO
        run: |
          cd work
          mkdir -p iso extract
          sudo mount -o loop debian.iso iso
          sudo rsync -a iso/ extract/
          sudo umount iso

      - name: Inject Semi-Auto Preseed
        run: |
          sudo mkdir -p work/extract/preseed
          
          sudo tee work/extract/preseed/custom.cfg <<'EOF'
          ### 基本设置
          d-i debian-installer/locale string zh_CN.UTF-8
          d-i keyboard-configuration/xkb-keymap select us
          d-i time/zone string Asia/Shanghai
          
          ### 网络 & 源
          d-i netcfg/choose_interface select auto
          d-i netcfg/get_hostname string debian
          d-i netcfg/get_domain string local
          
          d-i mirror/country string manual
          d-i mirror/http/hostname string deb.debian.org
          d-i mirror/http/directory string /debian
          d-i apt-setup/non-free-firmware boolean true
          d-i apt-setup/non-free boolean true
          d-i apt-setup/contrib boolean true
          
          ### 账户配置 (创建 admin 用户并设好密码)
          d-i passwd/root-login boolean true
          d-i passwd/root-password password 123456
          d-i passwd/root-password-again password 123456
          
          d-i passwd/make-user boolean true
          d-i passwd/user-fullname string Cadier
          d-i passwd/username string cadier
          d-i passwd/user-password password 123456
          d-i passwd/user-password-again password 123456
          
          ### 分区 Semi-Auto（会停下来让你手动确认）
          d-i partman-auto/method string regular
          d-i partman-auto/choose_recipe select atomic
          d-i partman-partitioning/confirm_write_new_label boolean false
          d-i partman/choose_partition select finish
          d-i partman/confirm boolean false
          d-i partman/confirm_nooverwrite boolean false
          
          ### 桌面环境
          tasksel tasksel/first multiselect standard, gnome-desktop
          
          ### 软件包
          d-i pkgsel/include string \
            sudo nano htop curl wget git \
            python3 python3-pip python3-venv \
            firefox-esr network-manager-gnome \
            bluez bluetooth gnome-bluetooth \
            firmware-linux firmware-realtek firmware-iwlwifi \
            intel-media-va-driver-non-free \
            pipewire pipewire-alsa pipewire-pulse wireplumber pavucontrol \
            locales
          
          ### 排除
          d-i pkgsel/exclude string \
            libreoffice* games* thunderbird* evolution* rhythmbox totem cheese \
            shotwell simple-scan cups* yelp
          
          d-i pkgsel/upgrade select none
          popularity-contest popularity-contest/participate boolean false
          
          d-i grub-installer/only_debian boolean true
          d-i grub-installer/with_other_os boolean true
          
          d-i finish-install/reboot_in_progress note
          EOF

      - name: Configure Boot Menu
        run: |
          cd work/extract
          sudo sed -i '/append/ s|$| preseed/file=/cdrom/preseed/custom.cfg|' isolinux/txt.cfg || true
          sudo sed -i '/linux.*vmlinuz/ s|$| preseed/file=/cdrom/preseed/custom.cfg|' boot/grub/grub.cfg || true

      - name: Rebuild Custom ISO
        run: |
          cd work/extract
          sudo xorriso -as mkisofs \
            -r -V "Debian13_Root_GNOME_LXQt" \
            -o ../debian13-root-gnome-lxqt.iso \
            -J -joliet-long -cache-inodes \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -partition_offset 16 \
            -A "Debian 13 Root Custom" \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot \
            .

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-root-gnome-lxqt-iso
          path: work/debian13-root-gnome-lxqt.iso
