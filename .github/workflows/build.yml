name: Debian 13 Official ISO Semi-Auto Customizer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /var/lib/docker
          sudo docker system prune -af || true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget curl rsync xorriso genisoimage isolinux \
            syslinux-utils squashfs-tools p7zip-full

      - name: Download Official Debian 13 Netinst ISO
        run: |
          mkdir -p work
          cd work
          # 下载 2026 年 Debian 13 (Trixie) 官方网络安装镜像
          wget -O debian.iso \
            https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/debian-13.0.0-amd64-netinst.iso

      - name: Extract ISO
        run: |
          cd work
          mkdir -p iso extract
          sudo mount -o loop debian.iso iso
          rsync -a iso/ extract/
          sudo umount iso

      - name: Inject Semi-Auto Preseed
        run: |
          cd work/extract
          mkdir -p preseed
          
          cat > preseed/custom.cfg <<EOF
          ### 地区与语言设置
          d-i debian-installer/locale string zh_CN.UTF-8
          d-i keyboard-configuration/xkb-keymap select us
          d-i time/zone string Asia/Shanghai

          ### 网络配置
          d-i netcfg/choose_interface select auto
          d-i netcfg/get_hostname string debian
          d-i netcfg/get_domain string local

          ### 软件源设置
          d-i mirror/country string manual
          d-i mirror/http/hostname string deb.debian.org
          d-i mirror/http/directory string /debian
          d-i mirror/http/proxy string

          ### 用户账户 (预设用户: user 密码: debian)
          d-i passwd/root-login boolean false
          d-i passwd/user-fullname string Debian User
          d-i passwd/username string user
          d-i passwd/user-password password debian
          d-i passwd/user-password-again password debian

          ### 分区设置 (手动模式：会停在分区界面等你确认)
          d-i partman-auto/method string regular
          d-i partman-auto/choose_recipe select atomic
          d-i partman-partitioning/confirm_write_new_label boolean false
          d-i partman/choose_partition select finish
          d-i partman/confirm boolean false
          d-i partman/confirm_nooverwrite boolean false

          ### 软件包选择
          tasksel tasksel/first multiselect standard, gnome-desktop

          # 包含计算棒驱动、蓝牙、Pipewire 音频以及纯净 Python 3
          d-i pkgsel/include string \
            sudo nano htop python3 python3-pip \
            firefox-esr \
            network-manager network-manager-gnome \
            bluez bluetooth gnome-bluetooth \
            firmware-linux firmware-realtek firmware-iwlwifi firmware-intel-sound \
            intel-media-va-driver-non-free \
            pipewire pipewire-alsa pipewire-pulse wireplumber pavucontrol \
            fcitx5 fcitx5-chinese-addons fonts-wqy-microhei locales

          # 剔除你不需要的冗余软件
          d-i pkgsel/exclude string \
            libreoffice* games* thunderbird evolution* rhythmbox \
            totem cheese shotwell simple-scan cups* yelp supervisor python3-venv

          d-i pkgsel/upgrade select none
          popularity-contest popularity-contest/participate boolean false

          ### 引导程序
          d-i grub-installer/only_debian boolean true
          d-i grub-installer/with_other_os boolean true

          ### 结束安装 (会弹出提示点击确认再重启)
          d-i finish-install/reboot_in_progress note
          EOF

      - name: Configure Manual Boot Menu
        run: |
          cd work/extract
          # 仅注入 preseed 路径，移除 auto=true 以实现手动下一步
          sed -i '/append/ s@$@ preseed/file=/cdrom/preseed/custom.cfg@' \
            isolinux/txt.cfg || true

          sed -i '/linux/ s@$@ preseed/file=/cdrom/preseed/custom.cfg@' \
            boot/grub/grub.cfg || true

      - name: Rebuild Custom ISO
        run: |
          cd work/extract
          sudo xorriso -as mkisofs \
            -r -V "Debian13_Manual_Custom" \
            -o ../debian13-custom-manual.iso \
            -J -joliet-long -cache-inodes \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -partition_offset 16 \
            -A "Debian 13 Manual Custom" \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot \
            .

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian13-custom-manual-iso
          path: work/debian13-custom-manual.iso
